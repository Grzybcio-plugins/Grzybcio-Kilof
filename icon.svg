<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pickaxeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ED4E6"/>
      <stop offset="50%" style="stop-color:#BCDECE"/>
      <stop offset="100%" style="stop-color:#FAE7B5"/>
    </linearGradient>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5D2E0C"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGradient)"/>
  
  <!-- 3x3 Grid Background -->
  <g opacity="0.15">
    <rect x="106" y="280" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="176" y="280" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="246" y="280" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="106" y="350" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="176" y="350" width="60" height="60" rx="8" fill="#BCDECE"/>
    <rect x="246" y="350" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="106" y="420" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="176" y="420" width="60" height="60" rx="8" fill="#7ED4E6"/>
    <rect x="246" y="420" width="60" height="60" rx="8" fill="#7ED4E6"/>
  </g>
  
  <!-- Pickaxe -->
  <g filter="url(#shadow)" transform="translate(256, 220) rotate(-45)">
    <!-- Handle -->
    <rect x="-12" y="20" width="24" height="160" rx="6" fill="url(#handleGradient)"/>
    <rect x="-8" y="25" width="4" height="150" rx="2" fill="#A0522D" opacity="0.5"/>
    
    <!-- Pickaxe Head -->
    <g filter="url(#glow)">
      <!-- Left blade -->
      <path d="M -120 -20 L -20 -10 L -20 10 L -120 20 L -140 0 Z" 
            fill="url(#pickaxeGradient)" stroke="#5BC0DE" stroke-width="2"/>
      <!-- Right blade -->
      <path d="M 120 -20 L 20 -10 L 20 10 L 120 20 L 140 0 Z" 
            fill="url(#pickaxeGradient)" stroke="#5BC0DE" stroke-width="2"/>
      <!-- Center piece -->
      <rect x="-25" y="-15" width="50" height="30" rx="4" 
            fill="url(#pickaxeGradient)" stroke="#5BC0DE" stroke-width="2"/>
    </g>
    
    <!-- Shine effects -->
    <ellipse cx="-80" cy="-5" rx="20" ry="5" fill="white" opacity="0.3"/>
    <ellipse cx="80" cy="-5" rx="20" ry="5" fill="white" opacity="0.3"/>
  </g>
  
  <!-- 3x3 Badge -->
  <g transform="translate(400, 420)">
    <circle cx="0" cy="0" r="55" fill="#7ED4E6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="45" fill="#1a1a2e"/>
    <text x="0" y="8" font-family="Arial Black, sans-serif" font-size="32" font-weight="bold" 
          fill="url(#pickaxeGradient)" text-anchor="middle">3x3</text>
  </g>
  
  <!-- Title -->
  <text x="256" y="60" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" 
        fill="url(#pickaxeGradient)" text-anchor="middle" filter="url(#glow)">GRZYBCIO</text>
  <text x="256" y="95" font-family="Arial, sans-serif" font-size="24" 
        fill="#FFFFFF" text-anchor="middle" opacity="0.8">KILOF</text>
</svg>


